<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bidiso · Visualizador v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cormorant+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:       #1c1008;
  --parchment: #f5edd8;
  --parch-mid: #ede0c4;
  --parch-drk: #d9c9a8;
  --burgundy:  #7a1e2e;
  --gold:      #b8862a;
  --gold-lt:   #d4a843;
  --border:    #d8d0bc;
  --border-lt: #eae4d8;
  --chrome:    #ffffff;
  --chrome-2:  #f7f4ee;
  --chrome-3:  #f0ece2;
  --muted:     #8a7860;
  --picker-w:  220px;
  --sidebar-w: 180px;
  --toolbar-h: 52px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--chrome-3);
  color: var(--ink);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOOLBAR ── */
#toolbar {
  height: var(--toolbar-h);
  background: var(--chrome);
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  z-index: 100;
}

#toolbar-title {
  padding: 0 16px;
  color: var(--burgundy);
  font-family: 'Cormorant SC', serif;
  font-size: 12px;
  letter-spacing: 0.08em;
  white-space: nowrap;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  line-height: 1.3;
  min-width: var(--picker-w);
  max-width: var(--picker-w);
}
#toolbar-title span { display: block; color: var(--muted); font-size: 10px; font-weight: 300; letter-spacing: 0.12em; margin-top: 1px; }
#toolbar-title strong { color: var(--burgundy); }

#search-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  border-right: 1px solid var(--border);
  flex: 1;
  max-width: 480px;
}
#search-mode-badge {
  font-family: 'Cormorant SC', serif;
  font-size: 9px;
  letter-spacing: 0.1em;
  padding: 2px 6px;
  border-radius: 10px;
  border: 1px solid;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s;
}
#search-mode-badge.global { color: var(--gold); border-color: var(--gold); background: rgba(184,134,42,0.08); }
#search-mode-badge.local  { color: var(--burgundy); border-color: var(--burgundy); background: rgba(122,30,46,0.07); }
#search-progress-bar { display: none; height: 2px; background: var(--parch-drk); flex-shrink: 0; }
#search-progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.15s ease; }
#search-progress-bar.active { display: block; }
.doc-list-empty { padding: 16px 14px; font-family: 'Cormorant SC', serif; font-size: 11px; color: #a89878; letter-spacing: 0.08em; text-align: center; font-style: italic; }
#search-icon { color: var(--muted); font-size: 14px; }
#search-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--ink);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  caret-color: var(--gold);
}
#search-input::placeholder { color: #b0a898; }
#search-count {
  color: var(--muted);
  font-size: 12px;
  white-space: nowrap;
  font-family: 'Cormorant Garamond', serif;
}
.search-nav-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  padding: 2px 5px;
  transition: color 0.2s;
}
.search-nav-btn:hover { color: var(--burgundy); }

#toolbar-right {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 12px;
  margin-left: auto;
}
.tb-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  padding: 5px 9px;
  border-radius: 3px;
  transition: all 0.2s;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.05em;
}
.tb-btn:hover { color: var(--burgundy); border-color: var(--border); }
.tb-btn.active { color: var(--burgundy); border-color: var(--gold); background: var(--parch-mid); }

/* ── MAIN LAYOUT ── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── DOC PICKER ── */
#doc-picker {
  width: var(--picker-w);
  flex-shrink: 0;
  background: var(--chrome-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s ease;
}
#doc-picker.collapsed {
  width: 0;
  border-right: none;
}

#doc-filter-wrap {
  padding: 10px 10px 8px;
  border-bottom: 1px solid var(--border-lt);
  flex-shrink: 0;
}
#doc-filter-row {
  display: flex;
  align-items: center;
  gap: 4px;
}
#doc-filter {
  flex: 1;
  background: var(--chrome);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--ink);
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  padding: 5px 8px;
  outline: none;
  caret-color: var(--gold);
}
#doc-filter::placeholder { color: #b0a898; }
#doc-filter:focus { border-color: var(--gold); }
#doc-filter-clear {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 16px;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 3px;
  transition: color 0.15s;
  flex-shrink: 0;
}
#doc-filter-clear:hover { color: var(--burgundy); }
#doc-filter-clear.visible { display: block; }
#doc-count {
  font-family: 'Cormorant SC', serif;
  font-size: 9px;
  color: #a89878;
  letter-spacing: 0.1em;
  margin-top: 5px;
  text-align: center;
}

#doc-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
#doc-list::-webkit-scrollbar { width: 3px; }
#doc-list::-webkit-scrollbar-track { background: transparent; }
#doc-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.doc-item {
  padding: 6px 14px;
  cursor: pointer;
  font-family: 'Cormorant SC', serif;
  font-size: 12px;
  color: #6a5838;
  letter-spacing: 0.06em;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.doc-item:hover { background: var(--parch-mid); color: var(--ink); }
.doc-item.active {
  background: var(--parchment);
  color: var(--burgundy);
  border-left-color: var(--gold);
}
.doc-item.loading { color: var(--muted); font-style: italic; }

/* ── RESULTADOS POR PÁGINA ── */
.page-result {
  padding: 5px 10px 5px 14px;
  cursor: pointer;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 6px;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  border-bottom: 1px solid var(--border-lt);
}
.page-result:hover { background: var(--parch-mid); border-left-color: var(--gold-lt); }
.page-result.active { background: var(--parchment); border-left-color: var(--gold); }
.res-id {
  font-family: 'Cormorant SC', serif;
  font-size: 12px;
  color: #6a5838;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}
.page-result.active .res-id { color: var(--burgundy); }
.res-right {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.res-pag {
  font-family: 'Cormorant SC', serif;
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.page-result.active .res-pag { color: var(--gold-lt); }
.res-count {
  font-family: monospace;
  font-size: 9px;
  background: var(--gold);
  color: #fff;
  border-radius: 8px;
  padding: 1px 5px;
  min-width: 16px;
  text-align: center;
  line-height: 1.5;
}
.page-result.active .res-count { background: var(--gold-lt); }

/* ── PAGE SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--chrome-3);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-thumb {
  padding: 10px 8px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-lt);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  transition: background 0.2s;
  position: relative;
}
.sidebar-thumb:hover { background: var(--parch-mid); }
.sidebar-thumb.active { background: var(--parchment); }
.sidebar-thumb.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--gold);
}

.thumb-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  border: 1px solid var(--border);
  filter: none;
  transition: filter 0.2s;
}
.sidebar-thumb:hover .thumb-img,
.sidebar-thumb.active .thumb-img { filter: none; }

.thumb-label {
  font-family: 'Cormorant SC', serif;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-align: center;
}
.sidebar-thumb.active .thumb-label { color: var(--burgundy); }

/* ── WELCOME / EMPTY STATE ── */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--muted);
  font-family: 'Cormorant SC', serif;
  letter-spacing: 0.12em;
  background: var(--chrome);
}
#welcome .welcome-icon { font-size: 48px; opacity: 0.3; }
#welcome .welcome-title { font-size: 18px; color: #6a5838; }
#welcome .welcome-sub { font-size: 11px; color: #a89878; }

/* ── VIEWER ── */
#viewer {
  flex: 1;
  display: flex;
  overflow: hidden;
  background: var(--chrome);
}

/* ── IMAGE PANEL ── */
#img-panel {
  flex: 0 0 auto;
  width: 50%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
  background: var(--chrome-3);
  position: relative;
}

#img-panel-inner {
  flex: 1;
  overflow: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
#img-panel-inner::-webkit-scrollbar { width: 6px; height: 6px; }
#img-panel-inner::-webkit-scrollbar-track { background: transparent; }
#img-panel-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

#book-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  cursor: zoom-in;
  transition: transform 0.3s;
}
#book-img.zoomed { cursor: zoom-out; }

#img-toolbar {
  height: 36px;
  background: var(--chrome);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-shrink: 0;
}
.img-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 2px;
  transition: color 0.2s;
  font-family: 'Cormorant Garamond', serif;
}
.img-btn:hover { color: var(--burgundy); }
#zoom-level { color: var(--muted); font-size: 11px; font-family: monospace; min-width: 38px; text-align: center; }

#no-img-msg {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: #b0a898;
  font-family: 'Cormorant SC', serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  height: 100%;
}

/* ── TEXT PANEL ── */
#text-panel {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
  background: var(--parchment);
  background-image:
    radial-gradient(ellipse at 20% 80%, rgba(180,140,80,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(160,120,60,0.04) 0%, transparent 50%);
}
#text-panel::-webkit-scrollbar { width: 8px; }
#text-panel::-webkit-scrollbar-track { background: var(--parch-mid); }
#text-panel::-webkit-scrollbar-thumb { background: var(--parch-drk); border-radius: 4px; }

#text-header {
  padding: 14px 24px 12px;
  border-bottom: 1px solid var(--parch-drk);
  background: var(--parch-mid);
  flex-shrink: 0;
}
#text-page-id {
  font-family: 'Cormorant SC', serif;
  font-size: 10px;
  color: #9a7850;
  letter-spacing: 0.15em;
  margin-bottom: 2px;
}
#text-page-label {
  font-family: 'Cormorant SC', serif;
  font-size: 13px;
  color: var(--burgundy);
  letter-spacing: 0.06em;
}

#text-content {
  padding: 22px 32px 36px;
  font-size: 15px;
  line-height: 1.85;
  color: var(--ink);
  flex: 1;
}

#text-content .page-num {
  display: inline-block;
  font-family: 'Cormorant SC', serif;
  font-size: 11px;
  color: #9a7850;
  background: var(--parch-mid);
  border: 1px solid var(--parch-drk);
  padding: 1px 8px;
  letter-spacing: 0.12em;
  border-radius: 2px;
}
.page-num-wrap { text-align: center; margin: 12px 0 8px; }

#text-content .section-title {
  font-family: 'Cormorant SC', serif;
  font-size: 14px;
  color: var(--burgundy);
  letter-spacing: 0.12em;
  text-align: center;
  margin: 18px 0 12px;
  padding: 6px 0;
  border-top: 1px solid var(--parch-drk);
  border-bottom: 1px solid var(--parch-drk);
}

#text-content .doc-title {
  font-family: 'Cormorant SC', serif;
  font-size: 16px;
  color: var(--burgundy);
  letter-spacing: 0.1em;
  text-align: center;
  margin: 10px 0 16px;
  line-height: 1.5;
}

#text-content p {
  margin-bottom: 0.9em;
  text-align: justify;
  hyphens: auto;
}

#text-content .footnotes {
  margin-top: 20px;
  padding-top: 10px;
  border-top: 1px solid var(--parch-drk);
  font-size: 12px;
  color: #6a5030;
  line-height: 1.6;
}
#text-content .footnotes p { margin-bottom: 0.3em; font-style: italic; }

#text-content .cat-label {
  font-family: 'Cormorant SC', serif;
  font-size: 9px;
  color: #b09060;
  letter-spacing: 0.1em;
  background: var(--parch-drk);
  padding: 1px 5px;
  border-radius: 2px;
  vertical-align: middle;
  margin-right: 4px;
}

/* Badge de hits en sidebar */
.thumb-hit-badge {
  position: absolute;
  top: 5px; right: 5px;
  background: var(--gold);
  color: #fff;
  font-size: 9px;
  font-family: monospace;
  border-radius: 8px;
  padding: 1px 5px;
  min-width: 16px;
  text-align: center;
  line-height: 1.5;
  pointer-events: none;
}

mark.hit {
  background: rgba(185, 134, 42, 0.25);
  color: inherit;
  border-radius: 2px;
  padding: 0 1px;
}
mark.hit.current {
  background: rgba(185, 134, 42, 0.55);
  outline: 1px solid var(--gold);
}

/* ── LOADING OVERLAY ── */
#loading-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.82);
  z-index: 50;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant SC', serif;
  font-size: 14px;
  color: var(--burgundy);
  letter-spacing: 0.15em;
  pointer-events: none;
}
#loading-overlay.active { display: flex; }

/* ── NAV BAR ── */
#nav-bar {
  height: 42px;
  background: var(--chrome);
  border-top: 2px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-shrink: 0;
}
.nav-btn {
  background: none;
  border: 1px solid var(--border);
  color: #6a5838;
  cursor: pointer;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  padding: 3px 14px;
  border-radius: 2px;
  letter-spacing: 0.06em;
  transition: all 0.2s;
}
.nav-btn:hover:not(:disabled) { color: var(--burgundy); border-color: var(--gold); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
#nav-counter {
  font-family: 'Cormorant SC', serif;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  min-width: 90px;
  text-align: center;
}

/* ── LIGHTBOX ── */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; box-shadow: 0 20px 80px rgba(0,0,0,0.8); }

/* scrollbar global */
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div id="toolbar-title">
    <strong id="doc-id-label">Bidiso OCR</strong>
    <span id="doc-subtitle">Selecciona un documento</span>
  </div>
  <div id="search-wrap">
    <span id="search-icon">🔍</span>
    <input id="search-input" type="text" placeholder="Buscar en todos los documentos…" autocomplete="off" spellcheck="false">
    <span id="search-count"></span>
    <button class="search-nav-btn" id="prev-hit" title="Anterior" style="display:none">▲</button>
    <button class="search-nav-btn" id="next-hit" title="Siguiente" style="display:none">▼</button>
    <span id="search-mode-badge" class="global">global</span>
  </div>
  <div id="toolbar-right">
    <button class="tb-btn active" id="btn-split" title="Vista dividida">⬜⬜ Dividida</button>
    <button class="tb-btn" id="btn-imgonly" title="Solo imagen">🖼 Imagen</button>
    <button class="tb-btn" id="btn-txtonly" title="Solo texto">📜 Texto</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- DOC PICKER -->
  <div id="doc-picker">
    <div id="doc-filter-wrap">
      <div id="doc-filter-row">
        <input id="doc-filter" type="text" placeholder="Filtrar por ID…" autocomplete="off" spellcheck="false">
        <button id="doc-filter-clear" title="Mostrar todos">×</button>
      </div>
      <div id="doc-count"></div>
    </div>
    <div id="search-progress-bar"><div id="search-progress-fill"></div></div>
    <div id="doc-list"></div>
  </div>

  <!-- PAGE SIDEBAR -->
  <div id="sidebar"></div>

  <!-- VIEWER -->
  <div id="viewer" style="position:relative">
    <div id="loading-overlay">Cargando…</div>

    <!-- WELCOME -->
    <div id="welcome">
      <div class="welcome-icon">📜</div>
      <div class="welcome-title">Bidiso · Visualizador</div>
      <div class="welcome-sub">Selecciona un documento en el panel izquierdo</div>
    </div>

    <!-- IMAGE PANEL -->
    <div id="img-panel" style="display:none">
      <div id="img-panel-inner">
        <img id="book-img" src="" alt="Página del libro">
        <div id="no-img-msg">
          <span style="font-size:32px;opacity:.3">📷</span>
          Imagen no disponible
        </div>
      </div>
      <div id="img-toolbar">
        <button class="img-btn" id="zoom-out">− Reducir</button>
        <span id="zoom-level">100%</span>
        <button class="img-btn" id="zoom-in">+ Ampliar</button>
        <button class="img-btn" id="zoom-fit">Ajustar</button>
        <button class="img-btn" id="zoom-full">⤢ Pantalla completa</button>
      </div>
    </div>

    <!-- TEXT PANEL -->
    <div id="text-panel" style="display:none">
      <div id="text-header">
        <div id="text-page-id"></div>
        <div id="text-page-label"></div>
      </div>
      <div id="text-content"></div>
    </div>

  </div><!-- /viewer -->

</div><!-- /main -->

<!-- NAV BAR -->
<div id="nav-bar">
  <button class="nav-btn" id="btn-prev">◂ Anterior</button>
  <span id="nav-counter"></span>
  <button class="nav-btn" id="btn-next">Siguiente ▸</button>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img id="lb-img" src="" alt="Imagen ampliada">
</div>

<script>
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// ÍNDICE DE BÚSQUEDA POR PÁGINA
// ═══════════════════════════════════════════════════════════════
let pagesIndex = null;
let pagesIndexPromise = null;

function ensurePagesIndex() {
  if (pagesIndex) return Promise.resolve(pagesIndex);
  if (pagesIndexPromise) return pagesIndexPromise;
  pagesIndexPromise = fetch('search_index_pages.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => { pagesIndex = data; return data; })
    .catch(e => { console.error('Índice de páginas no cargado:', e); pagesIndex = {}; return {}; });
  return pagesIndexPromise;
}
ensurePagesIndex(); // precarga en segundo plano

// ═══════════════════════════════════════════════════════════════
// MODO DE BÚSQUEDA: global (>1 ID visible) vs local (exactamente 1)
// ═══════════════════════════════════════════════════════════════
function getSearchMode() {
  return idFilteredIds.length === 1 ? 'local' : 'global';
}

function updateSearchModeBadge() {
  const mode = getSearchMode();
  const badge = document.getElementById('search-mode-badge');
  badge.textContent = mode;
  badge.className = mode;
  document.getElementById('search-input').placeholder =
    mode === 'local' ? 'Buscar en este documento…' : 'Buscar en todos los documentos…';
}

// ═══════════════════════════════════════════════════════════════
// BÚSQUEDA GLOBAL — resultados a nivel de página
// ═══════════════════════════════════════════════════════════════
async function globalTextSearch(q) {
  const progressBar = document.getElementById('search-progress-bar');

  if (!pagesIndex) {
    progressBar.classList.add('active');
    document.getElementById('search-progress-fill').style.width = '60%';
    document.getElementById('doc-list').innerHTML = '<div class="doc-list-empty">Cargando índice…</div>';
    document.getElementById('search-count').textContent = '';
  }

  const idx = await ensurePagesIndex();
  progressBar.classList.remove('active');

  const results = [];
  const docsSeen = new Set();
  const re = buildSearchRegex(q);

  for (const id of idFilteredIds) {
    const pages = idx[id];
    if (!pages) continue;
    for (let i = 0; i < pages.length; i++) {
      const [pageNum, text] = pages[i];
      if (!text) continue;
      const m = text.match(re); // global regex: devuelve todas las ocurrencias
      if (m) {
        results.push({ docId: id, arrayIdx: i, pageNum, count: m.length });
        docsSeen.add(id);
      }
    }
  }

  globalResults   = results;
  globalResultIdx = -1;
  buildPageResultsList(results, docsSeen.size);
  updateNavButtons();
}

// ABRIR DOCUMENTO EN UNA PÁGINA CONCRETA (desde resultado global)
// ═══════════════════════════════════════════════════════════════
async function openDocAtPage(docId, targetArrayIdx) {
  // Marcar resultado activo en la lista
  document.querySelectorAll('.page-result').forEach(el => {
    el.classList.toggle('active',
      el.dataset.docId === docId && parseInt(el.dataset.arrayIdx) === targetArrayIdx);
  });

  // Si el documento ya está cargado, solo navegar a la página
  if (currentDocId === docId && PAGES.length > 0) {
    renderPage(targetArrayIdx);
    const activeQ = document.getElementById('search-input').value.trim();
    if (activeQ) highlightCurrentPage(activeQ);
    return;
  }

  // Cargar el documento sin entrar en modo local
  document.getElementById('loading-overlay').classList.add('active');
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('img-panel').style.display = 'none';
  document.getElementById('text-panel').style.display = 'none';

  try {
    const resp = await fetch(`bidiso_resultados_layout/${docId}.json`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    PAGES = parseJsonData(data);
    currentDocId = docId;

    // NO cambiamos idFilteredIds ni el modo — mantenemos modo global
    document.getElementById('doc-id-label').textContent = `Doc. ${docId}`;
    document.getElementById('doc-subtitle').textContent = `${PAGES.length} página${PAGES.length !== 1 ? 's' : ''}`;

    buildSidebar();
    showViewer();
    renderPage(targetArrayIdx);

    const activeQ = document.getElementById('search-input').value.trim();
    if (activeQ) highlightCurrentPage(activeQ);

  } catch (err) {
    document.getElementById('loading-overlay').classList.remove('active');
    document.getElementById('welcome').style.display = 'flex';
    document.getElementById('welcome').innerHTML = `
      <div class="welcome-icon">⚠️</div>
      <div class="welcome-title">Error al cargar doc. ${docId}</div>
      <div class="welcome-sub">${esc(err.message)}</div>
    `;
  }
}

// ═══════════════════════════════════════════════════════════════
// PARSEO DE JSON
// ═══════════════════════════════════════════════════════════════
function parseJsonData(data) {
  data.sort((a, b) => {
    const na = parseInt((a.file || '').match(/-(\d+)\.\w+$/)?.[1] || 0);
    const nb = parseInt((b.file || '').match(/-(\d+)\.\w+$/)?.[1] || 0);
    return na - nb;
  });

  const pages = [];
  for (const pageData of data) {
    const imgPath = pageData.file || '';
    const pageNum = imgPath.match(/-(\d+)\.\w+$/)?.[1] || '?';
    const basename = imgPath.match(/([^/]+)\.\w+$/)?.[1] || pageNum;

    let elements = [];
    if (pageData.text) {
      try {
        const items = JSON.parse(pageData.text);
        const content = items[0]?.choices?.[0]?.message?.content;
        if (content) {
          try {
            elements = JSON.parse(content);
          } catch (_) {
            // Normalizar comillas tipográficas
            const cn = content.replace(/\u201c|\u201d/g, '"');
            const _skip = /too blurry|cannot read|can't read|not legible|illegible/i;
            let m;
            // 1) Entradas bien formadas: "category" + "text"
            const re1 = /"category"\s*:\s*"([^"]+)"[^}]*"text"\s*:\s*"((?:[^"\\]|\\.)*)"/g;
            while ((m = re1.exec(cn)) !== null)
              elements.push({ category: m[1], text: m[2].replace(/\\n/g, '\n') });
            // 2) bbox)): texto
            const re2 = /"bbox\)\):\s*(?:[,\[]*"?)([^"{}]{2,})"?\}/g;
            while ((m = re2.exec(cn)) !== null) {
              const t = m[1].replace(/^[ ,\[\]"]+|[ ,\[\]"]+$/g, '').trim();
              if (t.length >= 2) elements.push({ category: 'Text', text: t });
            }
            // 3) bbox**: "**texto**"
            const re3 = /"bbox\*\*:\s*"?\*\*([^*"{}]{2,})\*\*/g;
            while ((m = re3.exec(cn)) !== null) {
              const t = m[1].replace(/^[ .*]+|[ .*]+$/g, '').trim();
              if (t.length >= 2 && !_skip.test(t)) elements.push({ category: 'Text', text: t });
            }
            // 4) bbox**: - texto
            const re4 = /"bbox\*\*:\s*-\s*([^*"{}]{3,}?)(?:\*\*)?["}]/g;
            while ((m = re4.exec(cn)) !== null) {
              const t = m[1].trim();
              if (t.length >= 2 && !_skip.test(t)) elements.push({ category: 'Text', text: t });
            }
            // 5) bbox**: ["texto"]
            const re5 = /"bbox\*\*:\s*\["(-?[^"{}]{2,})"/g;
            while ((m = re5.exec(cn)) !== null) {
              const t = m[1].trim();
              if (t.length >= 2 && !_skip.test(t)) elements.push({ category: 'Text', text: t });
            }
            // 6) "category":"Text","**texto**"
            const re6 = /"category"\s*:\s*"Text"\s*,\s*"\*\*(-?[^*"{}]{2,})\*\*"/g;
            while ((m = re6.exec(cn)) !== null) {
              const t = m[1].trim();
              if (t.length >= 2 && !_skip.test(t)) elements.push({ category: 'Text', text: t });
            }
          }
        }
      } catch (_) {}
    }

    const parts = imgPath.split('/').filter(Boolean);
    const relImg = parts.length >= 2 ? parts.slice(-2).join('/') : imgPath;

    pages.push({
      id: basename,
      img: relImg,
      label: 'Pág. ' + pageNum,
      elements,
      hasError: !!pageData.error
    });
  }
  return pages;
}

// ═══════════════════════════════════════════════════════════════
// FORMATEO DE ELEMENTOS → HTML
// ═══════════════════════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatElements(elements) {
  if (!elements || elements.length === 0) {
    return '<p style="color:#9a7850;font-style:italic">Sin transcripción disponible para esta página.</p>';
  }

  let html = '';
  let footnotes = [];

  for (const el of elements) {
    const cat = el.category || '';
    const text = (el.text || '').trim();
    if (!text) continue;

    switch (cat) {
      case 'Title':
        html += `<div class="doc-title">${esc(text)}</div>\n`;
        break;
      case 'Section-header':
        html += `<div class="section-title">${esc(text)}</div>\n`;
        break;
      case 'Page-header': {
        const m = text.match(/^\(?\s*(\d+)\s*\)?$/);
        if (m) {
          html += `<div class="page-num-wrap"><span class="page-num">pág. ${m[1]}</span></div>\n`;
        } else {
          html += `<p><span class="cat-label">cab.</span>${esc(text)}</p>\n`;
        }
        break;
      }
      case 'Page-footer':
        html += `<p><span class="cat-label">pie</span><em style="font-size:12px;color:#7a6040">${esc(text)}</em></p>\n`;
        break;
      case 'Footnote':
        footnotes.push(text);
        break;
      case 'Picture':
        break;
      case 'Text':
      default:
        html += `<p>${esc(text)}</p>\n`;
    }
  }

  if (footnotes.length > 0) {
    html += `<div class="footnotes">`;
    for (const fn of footnotes) html += `<p>${esc(fn)}</p>`;
    html += `</div>\n`;
  }

  return html || '<p style="color:#9a7850;font-style:italic">Página sin texto extraíble.</p>';
}

// ═══════════════════════════════════════════════════════════════
// CARGA DE DOCUMENTO (desde la lista de IDs, modo local)
// ═══════════════════════════════════════════════════════════════
async function loadDocument(id) {
  document.querySelectorAll('.doc-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  document.getElementById('loading-overlay').classList.add('active');
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('img-panel').style.display = 'none';
  document.getElementById('text-panel').style.display = 'none';

  try {
    const resp = await fetch(`bidiso_resultados_layout/${id}.json`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    PAGES = parseJsonData(data);
    currentDocId = id;

    // Pasar a modo local
    idFilteredIds = [id];
    const docFilterEl2 = document.getElementById('doc-filter');
    docFilterEl2.value = id;
    document.getElementById('doc-filter-clear').classList.add('visible');
    buildDocList([id]);
    updateSearchModeBadge();

    document.getElementById('doc-id-label').textContent = `Doc. ${id}`;
    document.getElementById('doc-subtitle').textContent = `${PAGES.length} página${PAGES.length !== 1 ? 's' : ''}`;

    buildSidebar();
    showViewer();
    renderPage(0);

    const activeQ = document.getElementById('search-input').value.trim();
    if (activeQ) {
      applyLocalSearch(activeQ);
      if (pageHitsList.length > 0 && pageHitsList[0] !== 0) renderPage(pageHitsList[0]);
    }

  } catch (err) {
    document.getElementById('loading-overlay').classList.remove('active');
    document.getElementById('welcome').style.display = 'flex';
    document.getElementById('welcome').innerHTML = `
      <div class="welcome-icon">⚠️</div>
      <div class="welcome-title">Error al cargar doc. ${id}</div>
      <div class="welcome-sub">${esc(err.message)}</div>
    `;
  }
}

function showViewer() {
  const mode = getCurrentMode();
  applyModeVisibility(mode);
}

// ═══════════════════════════════════════════════════════════════
// RENDER DE PÁGINA
// ═══════════════════════════════════════════════════════════════
function renderPage(idx) {
  document.getElementById('loading-overlay').classList.remove('active');

  const page = PAGES[idx];
  if (!page) return;

  document.querySelectorAll('.sidebar-thumb').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const imgEl = document.getElementById('book-img');
  const noImgEl = document.getElementById('no-img-msg');
  imgEl.style.display = 'block';
  noImgEl.style.display = 'none';
  imgEl.src = page.img;
  imgEl.onerror = () => {
    imgEl.style.display = 'none';
    noImgEl.style.display = 'flex';
  };
  zoomScale = 1;
  applyZoom();

  document.getElementById('text-page-id').textContent = page.id;
  document.getElementById('text-page-label').textContent = page.label +
    (page.hasError ? ' ⚠ (error en procesado)' : '');

  rawHTML = formatElements(page.elements);
  document.getElementById('text-content').innerHTML = rawHTML;

  document.getElementById('nav-counter').textContent = `${idx + 1} / ${PAGES.length}`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === PAGES.length - 1;

  const q = document.getElementById('search-input').value.trim();
  if (q && getSearchMode() === 'local') {
    highlightCurrentPage(q);
    const docTotal = pageHitsCount.reduce((a, b) => a + b, 0);
    if (docTotal > 0 && hits.length === 0) {
      document.getElementById('search-count').textContent =
        'Sin resultados  ·  ' + docTotal + ' en ' + pageHitsList.length + ' págs.';
    }
  } else if (q && getSearchMode() === 'global') {
    // En modo global, solo resaltar sin escanear todo
    highlightCurrentPage(q);
  } else {
    hits = [];
  }

  currentIdx = idx;

  const activeThumb = document.querySelector('.sidebar-thumb.active');
  if (activeThumb) activeThumb.scrollIntoView({ block: 'nearest' });
}

// ═══════════════════════════════════════════════════════════════
// SIDEBAR DE PÁGINAS
// ═══════════════════════════════════════════════════════════════
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  PAGES.forEach((page, i) => {
    const div = document.createElement('div');
    div.className = 'sidebar-thumb';
    div.innerHTML = `
      <img class="thumb-img" src="${esc(page.img)}" alt="${esc(page.id)}" loading="lazy"
           onerror="this.style.opacity='0.15'">
      <div class="thumb-label">${esc(page.label)}</div>
    `;
    div.addEventListener('click', () => renderPage(i));
    sb.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════════════
// PANEL SELECTOR DE DOCUMENTOS — lista de IDs
// ═══════════════════════════════════════════════════════════════
function buildDocList(ids, isSearchResult) {
  const list = document.getElementById('doc-list');
  list.innerHTML = '';
  if (ids.length === 0) {
    list.innerHTML = '<div class="doc-list-empty">Sin resultados</div>';
    document.getElementById('doc-count').textContent = '0 de ' + ALL_IDS.length + ' documentos';
    return;
  }
  for (const id of ids) {
    const div = document.createElement('div');
    div.className = 'doc-item' + (id === currentDocId ? ' active' : '');
    div.dataset.id = id;
    div.textContent = id;
    div.addEventListener('click', () => loadDocument(id));
    list.appendChild(div);
  }
  if (!isSearchResult) {
    document.getElementById('doc-count').textContent = ids.length + ' de ' + ALL_IDS.length + ' documentos';
  }
  list.scrollTop = 0;
}

// ═══════════════════════════════════════════════════════════════
// PANEL SELECTOR — resultados por página (modo global con query)
// ═══════════════════════════════════════════════════════════════
function buildPageResultsList(results, docsCount) {
  const list = document.getElementById('doc-list');
  const countEl = document.getElementById('doc-count');
  list.innerHTML = '';

  if (results.length === 0) {
    list.innerHTML = '<div class="doc-list-empty">Sin resultados</div>';
    document.getElementById('search-count').textContent = 'Sin resultados';
    countEl.textContent = '0 páginas';
    return;
  }

  results.forEach((r, ri) => {
    const div = document.createElement('div');
    div.className = 'page-result' +
      (r.docId === currentDocId && r.arrayIdx === currentIdx ? ' active' : '');
    div.dataset.docId = r.docId;
    div.dataset.arrayIdx = r.arrayIdx;
    div.innerHTML =
      `<span class="res-id">${esc(r.docId)}</span>` +
      `<span class="res-right"><span class="res-pag">pág.&nbsp;${r.pageNum}</span>` +
      `<span class="res-count">${r.count}</span></span>`;
    div.addEventListener('click', () => {
      globalResultIdx = ri;
      updateGlobalCounter();
      openDocAtPage(r.docId, r.arrayIdx);
    });
    list.appendChild(div);
  });

  document.getElementById('search-count').textContent =
    results.length + ' pág' + (results.length !== 1 ? 's.' : '.') +
    '  ·  ' + docsCount + ' doc' + (docsCount !== 1 ? 's' : '');
  countEl.textContent = results.length + ' págs. en ' + docsCount + ' docs';
  list.scrollTop = 0;
}

function filterDocListById(q) {
  idFilteredIds = q ? ALL_IDS.filter(id => id.includes(q)) : [...ALL_IDS];

  if (!q && currentDocId !== null) closeCurrentDoc();

  buildDocList(idFilteredIds);
  updateSearchModeBadge();

  const searchQ = document.getElementById('search-input').value.trim();
  if (searchQ) {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => handleSearch(searchQ), 300);
  }
}

// ═══════════════════════════════════════════════════════════════
// BÚSQUEDA LOCAL
// ═══════════════════════════════════════════════════════════════
function getPagePlainText(page) {
  return (page.elements || []).map(el => el.text || '').join(' ');
}

function updateSidebarHitBadges(counts) {
  document.querySelectorAll('.sidebar-thumb').forEach((el, i) => {
    el.querySelector('.thumb-hit-badge')?.remove();
    if (counts && counts[i] > 0) {
      const b = document.createElement('span');
      b.className = 'thumb-hit-badge';
      b.textContent = counts[i];
      el.appendChild(b);
    }
  });
}

// Construye regex con bordes de palabra (incluye acentuadas)
function buildSearchRegex(q) {
  const esc2 = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const L = 'a-zA-Z0-9\u00C0-\u024F\u1E00-\u1EFF';
  return new RegExp('(?<![' + L + '])' + esc2 + '(?![' + L + '])', 'gi');
}

function scanAllPages(q) {
  pageHitsCount = new Array(PAGES.length).fill(0);
  pageHitsList  = [];
  if (!q || !PAGES.length) { updateSidebarHitBadges([]); return 0; }

  const re = buildSearchRegex(q);
  let total = 0;
  for (let i = 0; i < PAGES.length; i++) {
    const n = (getPagePlainText(PAGES[i]).match(re) || []).length;
    pageHitsCount[i] = n;
    if (n > 0) { pageHitsList.push(i); total += n; }
  }
  updateSidebarHitBadges(pageHitsCount);
  return total;
}

function highlightCurrentPage(q) {
  const content = document.getElementById('text-content');
  content.innerHTML = rawHTML;
  hits = [];
  hitIdx = 0;
  if (!q) return;

  const re = buildSearchRegex(q);
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let n;
  while ((n = walker.nextNode())) nodes.push(n);

  for (const node of nodes) {
    const text = node.nodeValue;
    if (!re.test(text)) continue;
    re.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const mark = document.createElement('mark');
      mark.className = 'hit';
      mark.textContent = m[0];
      frag.appendChild(mark);
      hits.push(mark);
      last = re.lastIndex;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
  if (hits.length) { hitIdx = 0; highlightCurrent(); }
}

function applyLocalSearch(q) {
  if (!q) {
    highlightCurrentPage('');
    updateSidebarHitBadges([]);
    document.getElementById('search-count').textContent = '';
    updateNavButtons();
    return;
  }
  const total = scanAllPages(q);
  highlightCurrentPage(q);
  updateNavButtons();

  if (total === 0) {
    document.getElementById('search-count').textContent = 'Sin resultados';
  } else {
    document.getElementById('search-count').textContent =
      total + ' en ' + pageHitsList.length + ' pág' + (pageHitsList.length !== 1 ? 's.' : '.');
  }
}

// ═══════════════════════════════════════════════════════════════
// CERRAR DOCUMENTO ACTUAL
// ═══════════════════════════════════════════════════════════════
function closeCurrentDoc() {
  currentDocId = null;
  PAGES = [];
  currentIdx = 0;
  rawHTML = '';
  hits = [];
  pageHitsCount = [];
  pageHitsList  = [];
  document.getElementById('sidebar').innerHTML = '';
  document.getElementById('img-panel').style.display  = 'none';
  document.getElementById('text-panel').style.display = 'none';
  const w = document.getElementById('welcome');
  w.style.display = 'flex';
  w.innerHTML = `
    <div class="welcome-icon">📜</div>
    <div class="welcome-title">Bidiso · Visualizador</div>
    <div class="welcome-sub">Selecciona un documento en el panel izquierdo</div>`;
  document.getElementById('doc-id-label').textContent  = 'Bidiso OCR';
  document.getElementById('doc-subtitle').textContent  = 'Selecciona un documento';
  document.getElementById('search-count').textContent  = '';
  document.getElementById('nav-counter').textContent   = '';
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next').disabled = true;
}

// ═══════════════════════════════════════════════════════════════
// DESPACHADOR DE BÚSQUEDA
// ═══════════════════════════════════════════════════════════════
function handleSearch(q) {
  if (!q) {
    document.getElementById('search-count').textContent = '';
    document.getElementById('search-progress-bar').classList.remove('active');
    globalResults   = [];
    globalResultIdx = -1;
    if (getSearchMode() === 'local') {
      applyLocalSearch('');
    } else {
      buildDocList(idFilteredIds);
      document.getElementById('doc-count').textContent = idFilteredIds.length + ' de ' + ALL_IDS.length + ' documentos';
      updateNavButtons();
    }
    return;
  }
  if (getSearchMode() === 'local') {
    applyLocalSearch(q);
  } else {
    globalTextSearch(q);
  }
}

function highlightCurrent() {
  hits.forEach((h, i) => h.classList.toggle('current', i === hitIdx));
  if (hits[hitIdx]) hits[hitIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
  const docTotal = pageHitsCount.length ? pageHitsCount.reduce((a, b) => a + b, 0) : 0;
  const label = (hitIdx + 1) + '/' + hits.length;
  document.getElementById('search-count').textContent =
    docTotal > hits.length
      ? label + '  ·  ' + docTotal + ' en ' + pageHitsList.length + ' págs.'
      : label;
}

// ═══════════════════════════════════════════════════════════════
// NAVEGACIÓN GLOBAL (prev/next entre resultados)
// ═══════════════════════════════════════════════════════════════
function updateNavButtons() {
  const mode = getSearchMode();
  const show = (mode === 'local' && pageHitsList.length > 0) ||
               (mode === 'global' && globalResults.length > 0);
  document.getElementById('prev-hit').style.display = show ? '' : 'none';
  document.getElementById('next-hit').style.display = show ? '' : 'none';
}

function updateGlobalCounter() {
  if (!globalResults.length) return;
  const pos = globalResultIdx >= 0 ? globalResultIdx + 1 : '–';
  const docCount = new Set(globalResults.map(r => r.docId)).size;
  document.getElementById('search-count').textContent =
    pos + '/' + globalResults.length + ' págs.  ·  ' + docCount + ' docs';
}

function navigateGlobal(delta) {
  if (!globalResults.length) return;
  if (globalResultIdx === -1) {
    globalResultIdx = delta > 0 ? 0 : globalResults.length - 1;
  } else {
    globalResultIdx = (globalResultIdx + delta + globalResults.length) % globalResults.length;
  }
  const r = globalResults[globalResultIdx];
  // Marcar activo en lista
  document.querySelectorAll('.page-result').forEach((el, i) => {
    el.classList.toggle('active', i === globalResultIdx);
  });
  const activeEl = document.querySelector('.page-result.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
  updateGlobalCounter();
  openDocAtPage(r.docId, r.arrayIdx);
}

// ═══════════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════════
function applyZoom() {
  const img = document.getElementById('book-img');
  img.style.transform = `scale(${zoomScale})`;
  img.style.transformOrigin = 'center center';
  document.getElementById('zoom-level').textContent = Math.round(zoomScale * 100) + '%';
}

// ═══════════════════════════════════════════════════════════════
// MODOS DE VISTA
// ═══════════════════════════════════════════════════════════════
let _currentMode = 'split';
function getCurrentMode() { return _currentMode; }

function applyModeVisibility(mode) {
  const imgPanel = document.getElementById('img-panel');
  const txtPanel = document.getElementById('text-panel');
  if (mode === 'split') {
    imgPanel.style.display = 'flex'; imgPanel.style.width = '50%';
    txtPanel.style.display = 'flex';
  } else if (mode === 'img') {
    imgPanel.style.display = 'flex'; imgPanel.style.width = '100%';
    txtPanel.style.display = 'none';
  } else {
    imgPanel.style.display = 'none';
    txtPanel.style.display = 'flex';
  }
}

function setMode(mode) {
  if (!PAGES.length) return;
  _currentMode = mode;
  document.getElementById('btn-split').classList.toggle('active', mode === 'split');
  document.getElementById('btn-imgonly').classList.toggle('active', mode === 'img');
  document.getElementById('btn-txtonly').classList.toggle('active', mode === 'txt');
  applyModeVisibility(mode);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
buildDocList(ALL_IDS);
updateSearchModeBadge();
updateNavButtons();

document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentIdx > 0) renderPage(currentIdx - 1);
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentIdx < PAGES.length - 1) renderPage(currentIdx + 1);
});

document.addEventListener('keydown', e => {
  const inInput = e.target.tagName === 'INPUT';
  if (!inInput) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      if (currentIdx < PAGES.length - 1) renderPage(currentIdx + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      if (currentIdx > 0) renderPage(currentIdx - 1);
    }
  }
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});

let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  searchTimer = setTimeout(() => handleSearch(q), getSearchMode() === 'global' ? 500 : 280);
});
document.getElementById('prev-hit').addEventListener('click', () => {
  if (getSearchMode() === 'global') { navigateGlobal(-1); return; }
  if (!pageHitsList.length) return;
  if (hits.length && hitIdx > 0) { hitIdx--; highlightCurrent(); return; }
  const pos = pageHitsList.indexOf(currentIdx);
  const prev = pageHitsList[pos <= 0 ? pageHitsList.length - 1 : pos - 1];
  renderPage(prev);
  hitIdx = hits.length - 1;
  highlightCurrent();
});
document.getElementById('next-hit').addEventListener('click', () => {
  if (getSearchMode() === 'global') { navigateGlobal(1); return; }
  if (!pageHitsList.length) return;
  if (hits.length && hitIdx < hits.length - 1) { hitIdx++; highlightCurrent(); return; }
  const pos = pageHitsList.indexOf(currentIdx);
  renderPage(pageHitsList[(pos + 1) % pageHitsList.length]);
});
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (e.shiftKey) document.getElementById('prev-hit').click();
    else document.getElementById('next-hit').click();
  }
});

const docFilterEl = document.getElementById('doc-filter');
const docFilterClear = document.getElementById('doc-filter-clear');

let filterTimer;
docFilterEl.addEventListener('input', e => {
  const q = e.target.value.trim();
  docFilterClear.classList.toggle('visible', q.length > 0);
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => filterDocListById(q), 150);
});
docFilterEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const first = document.querySelector('.doc-item');
    if (first) loadDocument(first.dataset.id);
  }
  if (e.key === 'Escape') {
    docFilterEl.value = '';
    docFilterClear.classList.remove('visible');
    filterDocListById('');
    docFilterEl.blur();
  }
});
docFilterClear.addEventListener('click', () => {
  docFilterEl.value = '';
  docFilterClear.classList.remove('visible');
  filterDocListById('');
  docFilterEl.focus();
});

document.getElementById('zoom-in').addEventListener('click', () => {
  zoomScale = Math.min(zoomScale + 0.25, 5);
  applyZoom();
});
document.getElementById('zoom-out').addEventListener('click', () => {
  zoomScale = Math.max(zoomScale - 0.25, 0.2);
  applyZoom();
});
document.getElementById('zoom-fit').addEventListener('click', () => { zoomScale = 1; applyZoom(); });
document.getElementById('zoom-full').addEventListener('click', () => {
  if (!PAGES.length) return;
  document.getElementById('lb-img').src = PAGES[currentIdx].img;
  document.getElementById('lightbox').classList.add('open');
});
document.getElementById('book-img').addEventListener('click', () => {
  if (!PAGES.length) return;
  document.getElementById('lb-img').src = PAGES[currentIdx].img;
  document.getElementById('lightbox').classList.add('open');
});
document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});

document.getElementById('btn-split').addEventListener('click', () => setMode('split'));
document.getElementById('btn-imgonly').addEventListener('click', () => setMode('img'));
document.getElementById('btn-txtonly').addEventListener('click', () => setMode('txt'));
</script>
</body>
</html>
