// Legend
const legendEl = document.getElementById('legend');
for (const [tag, label] of Object.entries(LABELS)) {
  const count = DATA.sonnets.filter(s => s.tag === tag).length;
  if (count === 0) continue;
  const shape = tag === 'D' ? 'tri' : 'dot';
  const style = shape === 'tri'

// Create points

// Scale factor
let maxR = 0;
sonnets.forEach(s => { maxR = Math.max(maxR, Math.abs(s.x), Math.abs(s.y), Math.abs(s.z)); });
const scale = 15 / maxR;

sonnets.forEach((s, idx) => {
  const x = s.x * scale, y = s.y * scale, z = s.z * scale;
  const color = COLORS[s.tag] || 0xffffff;
  let geo, mat, mesh;

  if (s.tag === 'D') {
    // Triangle (tetrahedron)
    geo = new THREE.TetrahedronGeometry(0.55, 0);
    mat = new THREE.MeshPhongMaterial({color, emissive: color, emissiveIntensity: 0.3, transparent: true, opacity: 0.9});
    mesh = new THREE.Mesh(geo, mat);
  } else if (s.tag === 'X') {
    // Octahedron for contraejemplos
    geo = new THREE.OctahedronGeometry(0.5, 0);
    mat = new THREE.MeshPhongMaterial({color, emissive: color, emissiveIntensity: 0.4, transparent: true, opacity: 0.9});
    mesh = new THREE.Mesh(geo, mat);
  } else {
    // Spheres for secure
    const radius = s.tag === 'S' ? 0.3 : 0.35;
    geo = new THREE.SphereGeometry(radius, 12, 8);
    mat = new THREE.MeshPhongMaterial({color, emissive: color, emissiveIntensity: 0.15, transparent: true, opacity: 0.75});
    mesh = new THREE.Mesh(geo, mat);
  }

  mesh.position.set(x, y, z);
  mesh.userData = {idx, sonnet: s};
  group.add(mesh);
  meshes.push(mesh);

  // Number label
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 32;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 20px Georgia';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText(String(s.n), 32, 22);
  const tex = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({map: tex, transparent: true, opacity: 0.7, depthTest: false});
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(x, y + 0.7, z);
  sprite.scale.set(1.8, 0.9, 1);
  group.add(sprite);
  labelSprites.push(sprite);
});

[{dir:[1,0,0],c:0xff4444,l:'PC1'},{dir:[0,1,0],c:0x44ff44,l:'PC2'},{dir:[0,0,1],c:0x4444ff,l:'PC3'}].forEach(a => {

  // Negative
  const pts2 = [new THREE.Vector3(0,0,0), new THREE.Vector3(-a.dir[0]*axLen, -a.dir[1]*axLen, -a.dir[2]*axLen)];
  const geo2 = new THREE.BufferGeometry().setFromPoints(pts2);
  const m2 = axMat(a.c); m2.opacity = 0.1;
  scene.add(new THREE.Line(geo2, m2));
});

      `<span class="num">#${s.n}</span> <span style="color:${COLOR_HEX[s.tag]}">[${s.tag}]</span>${autorStr}` +
      `<div class="inc">${s.inc}</div>` +
      `<div class="dist">d(A+B+S) = <b>${s.d}</b> <span class="verdict ${vc}">${s.v}</span></div>` +
      `<div style="font-size:10px;color:#64748b;margin-top:3px">End: ${s.ne}/14 · PC1=${s.x.toFixed(1)} PC2=${s.y.toFixed(1)} PC3=${s.z.toFixed(1)}</div>`;
    tooltipEl.style.display = 'block';
    tooltipEl.style.left = (e.clientX + 16) + 'px';
    tooltipEl.style.top = (e.clientY - 10) + 'px';
    // Highlight
    hits[0].object.material.emissiveIntensity = 0.8;
  } else {
    tooltipEl.style.display = 'none';
    meshes.forEach(m => m.material.emissiveIntensity = m.userData.sonnet.tag === 'X' ? 0.4 : (m.userData.sonnet.tag === 'D' ? 0.3 : 0.15));
  }
});

autoRotEl.addEventListener('change', () => autoRot = autoRotEl.checked);

// Animation
function animate(time) {
  requestAnimationFrame(animate);

  // Labels visibility
  const showLbl = labelsEl.checked;
  labelSprites.forEach(sp => sp.visible = showLbl);

  // Camera orbit
  if (autoRot && !isDragging) rotY += 0.003;
  const cx = Math.sin(rotY) * Math.cos(rotX) * camDist;
  const cy = Math.sin(rotX) * camDist;
  const cz = Math.cos(rotY) * Math.cos(rotX) * camDist;
  camera.position.set(cx, cy, cz);
  camera.lookAt(0, 0, 0);
  camera.updateMatrixWorld();

  const eyeSep = parseFloat(eyeSepEl.value);
  const useAnaglyph = anaglyphEl.checked && eyeSep > 0;

  if (useAnaglyph) {
    // Anaglyph: render left eye (red) and right eye (cyan)
    const halfSep = eyeSep * 0.5;

    // Get camera right vector
    const right = new THREE.Vector3();
    camera.getWorldDirection(right);
    const up = new THREE.Vector3(0, 1, 0);
    right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), up).normalize();

    // Left eye
    cameraL.copy(camera);
    cameraL.position.add(right.clone().multiplyScalar(-halfSep));
    cameraL.lookAt(0, 0, 0);
    cameraL.updateMatrixWorld();

    // Right eye
    cameraR.copy(camera);
    cameraR.position.add(right.clone().multiplyScalar(halfSep));
    cameraR.lookAt(0, 0, 0);
    cameraR.updateMatrixWorld();

    const gl = renderer.getContext();

    renderer.clear();

    // Left eye → Red channel
    gl.colorMask(true, false, false, true);
    renderer.render(scene, cameraL);

    // Clear depth only
    renderer.clearDepth();

    // Right eye → Cyan channels
    gl.colorMask(false, true, true, true);
    renderer.render(scene, cameraR);

    // Reset
    gl.colorMask(true, true, true, true);
  } else {
    renderer.clear();
    renderer.render(scene, camera);
  }
}

animate(0);

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
